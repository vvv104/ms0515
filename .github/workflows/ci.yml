name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc-13
            conan_compiler: gcc
            conan_compiler_version: "13"
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-latest
            compiler: clang-17
            conan_compiler: clang
            conan_compiler_version: "17"
            cc: clang-17
            cxx: clang++-17
          - os: macos-latest
            compiler: apple-clang
          - os: windows-latest
            compiler: msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install "conan>=2.0" ninja

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('emu/conanfile.py') }}
          restore-keys: |
            conan-${{ matrix.os }}-${{ matrix.compiler }}-

      - name: Install GCC 13
        if: matrix.cc == 'gcc-13'
        run: sudo apt-get install -y gcc-13 g++-13

      - name: Install Clang 17
        if: matrix.cc == 'clang-17'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 17

      - name: Configure Conan profile
        shell: bash
        run: |
          conan profile detect --force
          PROFILE=~/.conan2/profiles/default

          # C++23 on every compiler
          sed -i.bak -e 's/^compiler.cppstd=.*/compiler.cppstd=23/' "$PROFILE"

          # Pin compiler + version for Linux jobs (auto-detect uses system default)
          if [ -n "${{ matrix.conan_compiler }}" ]; then
            sed -i -e 's/^compiler=.*/compiler=${{ matrix.conan_compiler }}/' "$PROFILE"
            sed -i -e 's/^compiler\.version=.*/compiler.version=${{ matrix.conan_compiler_version }}/' "$PROFILE"
          fi

          # [conf] section: platform-specific knobs
          {
            echo ""
            echo "[conf]"
            if [ "${{ runner.os }}" = "Windows" ]; then
              # README requirement: Ninja generator on Windows
              echo "tools.cmake.cmaketoolchain:generator=Ninja"
            fi
            if [ "${{ runner.os }}" = "Linux" ]; then
              # Let Conan install xorg/wayland/audio apt packages it needs
              # (the xorg/system Conan recipe alone pulls ~40 libs that are
              # easier to delegate than to track by hand).
              echo "tools.system.package_manager:mode=install"
              echo "tools.system.package_manager:sudo=True"
            fi
          } >> "$PROFILE"

          echo "=== Conan profile ==="
          cat "$PROFILE"

      - name: Build (frontend + tests)
        shell: bash
        working-directory: emu
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: conan build . --build=missing

      - name: Run tests
        shell: bash
        working-directory: emu/build/Release/tests
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./ms0515_tests.exe
          else
            ./ms0515_tests
          fi
